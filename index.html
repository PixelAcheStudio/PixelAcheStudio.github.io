<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Ache Studio</title>
    
    <!-- Google Fonts: Poppins for that clean sans-serif look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons (Updated to 6.6.0) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- NEW: Favicon / Open Graph Tags -->
    
    <!-- Favicon (Placeholder, as external assets are not supported here) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Meta Tag for Mobile Browser Color -->
    <meta name="theme-color" content="#333333">

    <!-- Open Graph (OG) Tags for Link Previews -->
    <meta property="og:title" content="Pixel Ache Studio">
    <meta property="og:description" content="Official website for Pixel Ache Studio. Indie game development and creative projects.">
    <meta property="og:type" content="website">
    <!-- Note: og:url and og:image links are placeholders that rely on your external setup -->
    <meta property="og:url" content="https://pixelachestudio.com/"> 
    <meta property="og:image" content="https://pixelachestudio.com/preview-image.png"> 
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@PixelAcheStudio">
    <meta name="twitter:title" content="Pixel Ache Studio">
    <meta name="twitter:description" content="Official website for Pixel Ache Studio. Indie game development and creative projects.">
    <meta name="twitter:image" content="https://pixelachestudio.com/preview-image.png">
    <!-- End of NEW Tags -->

    <style>
        /* --- RESET & BASIC STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #333333; /* Brand Dark Grey */
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER (Default/Desktop) --- */
        header {
            /* Desktop: 3-column grid for L-C-R layout */
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            align-items: center;
            padding: 20px 20px; 
            border-bottom: 1px solid #3d3d3d;
            position: relative; 
        }

        /* Navigation Links (Left side) */
        .nav-left {
            justify-self: start; 
        }

        .nav-left a {
            color: #0CED31; /* Brand Green */
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid #0CED31;
            padding-bottom: 2px;
            font-size: 0.9rem;
        }

        /* Header Logo (Small) */
        .header-logo {
            display: flex;
            gap: 4px;
            height: 24px;
            justify-self: center;
        }
        
        .bar {
            width: 4px;
            height: 100%;
        }

        /* Social Icons & Lang (Right side container) */
        .nav-right {
            display: flex; /* Use flexbox to align social icons and language selector */
            align-items: center;
            gap: 20px; 
            justify-self: end; 
        }
        
        /* New: Group for social icons */
        .social-icons-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        /* Mobile Row: The social icon group for mobile is hidden by default on desktop */
        .social-icons-group.mobile-row {
            display: none;
        }

        /* Reusable Icon Styling for Social Links (Desktop Default) */
        .icon-box {
            border: 1px solid #0CED31; 
            border-radius: 4px;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0CED31;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .icon-box:hover {
            background-color: #0CED31;
            color: #333333; 
        }

        /* --- LANGUAGE SELECTOR (DROP-DOWN STYLES) --- */
        .lang-select {
            position: relative; 
            display: inline-block;
            cursor: pointer;
            user-select: none;
            z-index: 10; 
        }
        
        .lang-trigger {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #0CED31;
            font-size: 0.9rem;
            padding: 5px 0; 
        }
        
        .lang-select:hover .lang-trigger {
            opacity: 0.8;
        }

        /* Dropdown Menu Styling */
        .dropdown-menu {
            position: absolute;
            top: 100%; 
            right: 0;
            background-color: #252525; 
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            min-width: 120px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        /* Show dropdown on hover (for desktop) */
        .lang-select:hover .dropdown-menu {
            opacity: 1;
            pointer-events: auto;
        }

        .dropdown-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .dropdown-menu li {
            padding: 8px 12px;
            color: #ffffff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        
        .dropdown-menu li:hover {
            background-color: #3d3d3d; 
            color: #0CED31; 
        }
        /* --- END LANGUAGE SELECTOR STYLES --- */

        /* --- MAIN CONTENT, FOOTER (Unchanged) --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
            gap: 30px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            margin-top: 20px;
        }

        /* Main Logo (Large) */
        .main-logo {
            display: flex;
            gap: 15px;
            height: 90px;
        }

        .main-logo .bar {
            width: 15px;
        }

        /* Color classes for logo bars */
        .green { background-color: #0CED31; }
        .blue { background-color: #1BBCF7; }
        .magenta { background-color: #E922FF; } 
        .red { background-color: #FF0000; }

        .status-text {
            color: #0CED31; 
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* --- EMBEDS SECTION --- */
        .social-feeds {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 900px;
            justify-content: center;
            flex-wrap: wrap; 
            margin-top: 20px;
        }

        .feed-box {
            flex: 1;
            min-width: 300px;
            background: #252525;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            padding: 10px;
            overflow: hidden;
            max-height: 420px; 
        }

        /* --- FOOTER --- */
        footer {
            background-color: #252525; 
            padding: 40px 20px;
            text-align: center;
            margin-top: auto;
        }

        .footer-label {
            color: #ffffff;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }

        .email-link {
            color: #0CED31; 
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 500;
        }
        
        .email-link:hover {
            text-decoration: underline;
        }

        /* --- RESPONSIVE FIXES (Mobile View) --- */
        @media (max-width: 600px) {
            
            /* Mobile: Header switches to a 2-row layout */
            header {
                /* 2 columns for the first row (L-R), 2 rows total (Top Row, Bottom Row) */
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto; 
                padding: 15px 10px; /* Top/bottom padding reduced, right/left padding reduced */
                gap: 15px 0; /* Vertical gap between the two rows */
            }

            /* --- Row 1 (Home Link, Logo, Language Selector) --- */

            /* Nav Left (Home) */
            .nav-left {
                grid-row: 1;
                grid-column: 1;
            }

            /* Logo: Still needs absolute positioning to be centered perfectly, ignoring asymmetric side content */
            .header-logo {
                position: absolute;
                left: 50%;
                top: 15px; /* Adjust to sit vertically centered in Row 1 */
                transform: translateX(-50%); 
                justify-self: initial; 
                grid-row: 1;
                grid-column: 1 / 3;
            }
            
            /* Nav Right (Language Selector) */
            .nav-right {
                grid-row: 1;
                grid-column: 2;
                justify-self: end;
                /* On mobile, only display the Language Selector */
                gap: 0; 
            }
            
            /* Hide the social icons from the first row on mobile */
            .social-icons-group {
                display: none;
            }
            
            /* --- Row 2 (Social Icons) --- */
            
            /* Show and center the dedicated social row */
            .social-icons-group.mobile-row {
                display: flex; /* Show the social row */
                grid-row: 2; /* Place in the second row */
                grid-column: 1 / 3; /* Span both columns for full width */
                justify-content: center; /* Center the group horizontally */
                margin-top: 5px; /* Little extra separation from the row above */
                gap: 20px; /* Increase gap for touch targets */
            }
            
            /* Adjust icon size for better touch targets */
            .icon-box {
                width: 36px;
                height: 36px;
                font-size: 1rem; 
            }

            .lang-trigger {
                font-size: 0.8rem; 
            }

            h1 {
                font-size: 1.8rem;
            }
            .main-logo {
                height: 70px; 
            }
            .email-link {
                font-size: 1.1rem;
            }
            .social-feeds {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Main Content -->

    <!-- JavaScript for Language Switcher -->
    <script>
        // Translation Dictionary
        const translations = {
            en: {
                navHome: "Home",
                langText: "English",
                status: "Preparing...",
                footerLabel: "EMAIL ADDRESS"
            },
            ko: {
                navHome: "홈",
                langText: "한국어",
                status: "준비 중...",
                footerLabel: "이메일 주소"
            }
        };

        let currentLang = 'en';

        // Function to update all text elements based on language code
        function updateText(langCode) {
            const t = translations[langCode];
            if (!t) return;

            // Update Text Elements
            document.getElementById('nav-home').textContent = t.navHome;
            document.getElementById('lang-text').textContent = t.langText;
            document.getElementById('status-text').textContent = t.status;
            document.getElementById('footer-label').textContent = t.footerLabel;
        }

        // Function to handle language selection and updating state
        function setLanguage(langCode) {
            currentLang = langCode;
            updateText(currentLang);
        }

        // DOM Content Loaded Handler for Dropdown Logic
        document.addEventListener('DOMContentLoaded', () => {
            const selectorContainer = document.getElementById('lang-selector-container');
            const dropdown = document.getElementById('lang-dropdown');
            const trigger = selectorContainer.querySelector('.lang-trigger');
            
            // 1. Click listener on the trigger to explicitly toggle visibility (good for mobile/touch)
            trigger.addEventListener('click', () => {
                const isVisible = dropdown.style.opacity === '1';
                dropdown.style.opacity = isVisible ? '0' : '1';
                dropdown.style.pointerEvents = isVisible ? 'none' : 'auto';
            });
            
            // 2. Click listeners on the list items to select language
            dropdown.querySelectorAll('li').forEach(item => {
                item.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    setLanguage(lang);
                    
                    // Hide the dropdown after selection
                    dropdown.style.opacity = '0';
                    dropdown.style.pointerEvents = 'none';
                });
            });
            
            // 3. Optional: Click outside to close the dropdown
            document.addEventListener('click', (event) => {
                // If the click happened outside the entire container
                if (!selectorContainer.contains(event.target)) {
                    dropdown.style.opacity = '0';
                    dropdown.style.pointerEvents = 'none';
                }
            });

            // Set initial language on load
            setLanguage(currentLang);
        });
    </script>
